pipeline:
  identifier: Build_couman05_azure_devops_octane_tests_1773056041662
  name: Build azure-devops-octane-tests
  orgIdentifier: default
  projectIdentifier: default_project
  variables:
    - name: static_message
      type: String
      value: Hello from static pipeline variable
    - name: runtime_message
      type: String
      value: <+input>.default("Hello").allowedValues("Hello","Hi","Greetings")
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github_OAuth_1773055927224
        repoName: couman05/azure-devops-octane-tests
  stages:
    - stage:
        identifier: build
        name: build
        spec:
          caching:
            enabled: true
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: echo
                  name: echo hello world
                  spec:
                    shell: Sh
                    command: echo "Hello from Harness CI"
                  timeout: ""
                  type: Run
                  description: Example Run Step
              - step:
                  type: Run
                  name: echo test pipeline
                  identifier: echo_test_pipeline
                  spec:
                    shell: Sh
                    command: echo "test pipeline"
              - step:
                  type: Run
                  name: Run Maven Tests
                  identifier: Run_Maven_Tests
                  spec:
                    shell: Sh
                    command: mvn test
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - target/surefire-reports/*.xml
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Ignore
              - step:
                  type: Run
                  name: Print Account Variable
                  identifier: print_account_variable
                  spec:
                    shell: Sh
                    command: "echo \"Account variable value: <+variable.account.dummy_variable>\""
              - step:
                  type: Run
                  name: Print Pipeline Variables
                  identifier: print_pipeline_variables
                  spec:
                    shell: Sh
                    command: |
                      echo "Static variable: <+pipeline.variables.static_message>"
                      echo "Runtime variable: <+pipeline.variables.runtime_message>"
              - step:
                  type: GCSUpload
                  name: Upload To GCS
                  identifier: Upload_To_GCS
                  spec:
                    connectorRef: account.gcp_connector
                    bucket: harness-second-bucket
                    sourcePath: target/surefire-reports/*.xml
              - step:
                  type: Plugin
                  name: Publish artifact URL
                  identifier: Publish_artifact_URL
                  spec:
                    connectorRef: account.harnessImage
                    image: plugins/artifact-metadata-publisher
                    settings:
                      file_urls: https://storage.googleapis.com/harness-second-bucket/TEST-MF.simple.tests.AppTest.xml
                  description: Publish artifact URL to Harness Artifacts Tab
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
        type: CI
        description: ""
  notificationRules:
    - name: notification_rule
      identifier: notification_rule
      pipelineEvents:
        - type: PipelineStart
        - type: PipelineEnd
        - type: PipelineSuccess
      notificationMethod:
        type: Webhook
        spec:
          webhookUrl: https://webhook.site/704c5031-4463-4667-9202-5a9adef2b31c
      enabled: true
